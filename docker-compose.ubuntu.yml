# Family growth tracker — Ubuntu server deployment.
# Optimized for an 8GB RAM home server in production mode.

services:
  gateway:
    build:
      context: .
      dockerfile: backend/gateway/Dockerfile
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - GATEWAY_PORT=3000
      - JWT_SECRET=${JWT_SECRET:?set JWT_SECRET}
      - MONGO_URI=mongodb://mongo:27017/learning-tracker?replicaSet=rs0
      - GATEWAY_IDENTITY_SECRET=${GATEWAY_IDENTITY_SECRET:?set GATEWAY_IDENTITY_SECRET}
      - USER_SERVICE_URL=http://user-service:3001
      - PROGRESS_SERVICE_URL=http://progress-service:3002
      - HOMEWORK_SERVICE_URL=http://homework-service:3003
      - RESOURCE_SERVICE_URL=http://resource-service:3005
      - ANALYTICS_SERVICE_URL=http://analytics-service:3006
      - NOTIFICATION_SERVICE_URL=http://notification-service:3007
      - NODE_OPTIONS=--max-old-space-size=256
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    networks: [app-network]
    restart: always

  user-service:
    build:
      context: .
      dockerfile: backend/services/user-service/Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:?set JWT_SECRET}
      - MONGO_URI=mongodb://mongo:27017/learning-tracker?replicaSet=rs0
      - GATEWAY_IDENTITY_SECRET=${GATEWAY_IDENTITY_SECRET:?set GATEWAY_IDENTITY_SECRET}
      - RESOURCE_SERVICE_URL=http://resource-service:3005
      - MEDIA_REFERENCE_SERVICE_TOKEN=${MEDIA_REFERENCE_SERVICE_TOKEN:?set MEDIA_REFERENCE_SERVICE_TOKEN}
      - SENSITIVE_RATE_LIMIT_MAX_REQUESTS=20
      - NODE_OPTIONS=--max-old-space-size=256
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    networks: [app-network]
    restart: always

  progress-service:
    build:
      context: .
      dockerfile: backend/services/progress-service/Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3002
      - JWT_SECRET=${JWT_SECRET:?set JWT_SECRET}
      - MONGO_URI=mongodb://mongo:27017/learning-tracker?replicaSet=rs0
      - GATEWAY_IDENTITY_SECRET=${GATEWAY_IDENTITY_SECRET:?set GATEWAY_IDENTITY_SECRET}
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:?set INTERNAL_SERVICE_TOKEN}
      - NODE_OPTIONS=--max-old-space-size=256
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    networks: [app-network]
    restart: always

  homework-service:
    build:
      context: .
      dockerfile: backend/services/homework-service/Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3003
      - JWT_SECRET=${JWT_SECRET:?set JWT_SECRET}
      - MONGO_URI=mongodb://mongo:27017/learning-tracker?replicaSet=rs0
      - GATEWAY_IDENTITY_SECRET=${GATEWAY_IDENTITY_SECRET:?set GATEWAY_IDENTITY_SECRET}
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:?set INTERNAL_SERVICE_TOKEN}
      - PROGRESS_SERVICE_URL=http://progress-service:3002
      - STAR_AWARD_TIMEOUT_MS=3000
      - RESOURCE_SERVICE_URL=http://resource-service:3005
      - MEDIA_REFERENCE_SERVICE_TOKEN=${MEDIA_REFERENCE_SERVICE_TOKEN:?set MEDIA_REFERENCE_SERVICE_TOKEN}
      - ENABLE_RABBITMQ=false
      - NODE_OPTIONS=--max-old-space-size=256
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    networks: [app-network]
    restart: always

  resource-service:
    build:
      context: .
      dockerfile: backend/services/resource-service/Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3005
      - JWT_SECRET=${JWT_SECRET:?set JWT_SECRET}
      - MONGO_URI=mongodb://mongo:27017/learning-tracker?replicaSet=rs0
      - GATEWAY_IDENTITY_SECRET=${GATEWAY_IDENTITY_SECRET:?set GATEWAY_IDENTITY_SECRET}
      - PRIVATE_MEDIA_ROOT=/var/lib/family-growth/private-media
      - MEDIA_REFERENCE_SERVICE_TOKEN=${MEDIA_REFERENCE_SERVICE_TOKEN:?set MEDIA_REFERENCE_SERVICE_TOKEN}
      - MEDIA_SIGNING_SECRET=${MEDIA_SIGNING_SECRET:?set MEDIA_SIGNING_SECRET}
      - NODE_OPTIONS=--max-old-space-size=256
    volumes:
      - resource-data:/var/lib/family-growth/private-media
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    networks: [app-network]
    restart: always

  analytics-service:
    build:
      context: .
      dockerfile: backend/services/analytics-service/Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3006
      - JWT_SECRET=${JWT_SECRET:?set JWT_SECRET}
      - MONGO_URI=mongodb://mongo:27017/learning-tracker?replicaSet=rs0
      - GATEWAY_IDENTITY_SECRET=${GATEWAY_IDENTITY_SECRET:?set GATEWAY_IDENTITY_SECRET}
      - RESOURCE_SERVICE_URL=http://resource-service:3005
      - MEDIA_REFERENCE_SERVICE_TOKEN=${MEDIA_REFERENCE_SERVICE_TOKEN:?set MEDIA_REFERENCE_SERVICE_TOKEN}
      - REPORT_HISTORY_AVAILABLE_FROM=2026-06-01
      - NODE_OPTIONS=--max-old-space-size=256
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    networks: [app-network]
    restart: always

  notification-service:
    build:
      context: .
      dockerfile: backend/services/notification-service/Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3007
      - JWT_SECRET=${JWT_SECRET:?set JWT_SECRET}
      - MONGO_URI=mongodb://mongo:27017/learning-tracker?replicaSet=rs0
      - GATEWAY_IDENTITY_SECRET=${GATEWAY_IDENTITY_SECRET:?set GATEWAY_IDENTITY_SECRET}
      - ENABLE_RABBITMQ=false
      - NODE_OPTIONS=--max-old-space-size=256
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    networks: [app-network]
    restart: always

  frontend:
    build: ./frontend/web
    ports:
      - "80:80"
    depends_on: [gateway]
    networks: [app-network]
    restart: always

  mongo:
    image: mongo:6.0
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--wiredTigerCacheSizeGB", "0.5"]
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "quit(db.adminCommand({hello:1}).isWritablePrimary ? 0 : 2)"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks: [app-network]
    restart: always

  mongo-init:
    image: mongo:6.0
    depends_on:
      mongo:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        until mongosh --host mongo:27017 --quiet --eval "db.adminCommand('ping').ok"; do sleep 2; done;
        mongosh --host mongo:27017 --quiet --eval "try { rs.status() } catch (error) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo:27017'}]}) }";
        until mongosh --host mongo:27017 --quiet --eval "quit(db.adminCommand({hello:1}).isWritablePrimary ? 0 : 2)"; do sleep 2; done
    networks: [app-network]
    restart: "no"

networks:
  app-network:
    driver: bridge

volumes:
  mongo-data:
  resource-data:
