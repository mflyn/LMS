# 使用国内镜像源的 Docker Compose 配置
# 当官方镜像源无法访问时使用此配置

services:
  # API网关
  gateway:
    build: ./backend/gateway
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - GATEWAY_PORT=3000
      - JWT_SECRET=${JWT_SECRET:?set JWT_SECRET}
      - MONGO_URI=mongodb://mongo:27017/learning-tracker?replicaSet=rs0
      - GATEWAY_IDENTITY_SECRET=${GATEWAY_IDENTITY_SECRET:?set GATEWAY_IDENTITY_SECRET}
      - USER_SERVICE_URL=http://user-service:3001
      - DATA_SERVICE_URL=http://data-service:3008
      - PROGRESS_SERVICE_URL=http://progress-service:3002
      - HOMEWORK_SERVICE_URL=http://homework-service:3003
      - INTERACTION_SERVICE_URL=http://interaction-service:3004
      - RESOURCE_SERVICE_URL=http://resource-service:3005
      - ANALYTICS_SERVICE_URL=http://analytics-service:3006
      - NOTIFICATION_SERVICE_URL=http://notification-service:3007
    depends_on:
      - user-service
      - progress-service
      - homework-service
      - interaction-service
      - resource-service
      - analytics-service
      - notification-service
      - data-service
    networks:
      - app-network
    restart: always

  # 用户服务
  user-service:
    build: ./backend/services/user-service
    environment:
      - NODE_ENV=production
      - PORT=3001
      - MONGO_URI=mongodb://mongo:27017/learning-tracker?replicaSet=rs0
      - JWT_SECRET=${JWT_SECRET:?set JWT_SECRET}
      - GATEWAY_IDENTITY_SECRET=${GATEWAY_IDENTITY_SECRET:?set GATEWAY_IDENTITY_SECRET}
    depends_on:
      - mongo
    networks:
      - app-network
    restart: always

  # 进度服务
  progress-service:
    build: ./backend/services/progress-service
    environment:
      - NODE_ENV=production
      - PORT=3002
      - MONGO_URI=mongodb://mongo:27017/learning-tracker?replicaSet=rs0
      - JWT_SECRET=${JWT_SECRET:?set JWT_SECRET}
      - GATEWAY_IDENTITY_SECRET=${GATEWAY_IDENTITY_SECRET:?set GATEWAY_IDENTITY_SECRET}
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:?set INTERNAL_SERVICE_TOKEN}
    depends_on:
      mongo:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
    networks:
      - app-network
    restart: always

  # 作业服务
  homework-service:
    build: ./backend/services/homework-service
    environment:
      - NODE_ENV=production
      - PORT=3003
      - MONGO_URI=mongodb://mongo:27017/learning-tracker?replicaSet=rs0
      - JWT_SECRET=${JWT_SECRET:?set JWT_SECRET}
      - GATEWAY_IDENTITY_SECRET=${GATEWAY_IDENTITY_SECRET:?set GATEWAY_IDENTITY_SECRET}
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:?set INTERNAL_SERVICE_TOKEN}
      - PROGRESS_SERVICE_URL=http://progress-service:3002
      - STAR_AWARD_TIMEOUT_MS=${STAR_AWARD_TIMEOUT_MS:-3000}
    depends_on:
      mongo:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
    networks:
      - app-network
    restart: always

  # 家校互动服务
  interaction-service:
    build: ./backend/services/interaction-service
    environment:
      - NODE_ENV=production
      - PORT=3004
      - MONGO_URI=mongodb://mongo:27017/learning-tracker?replicaSet=rs0
      - GATEWAY_IDENTITY_SECRET=${GATEWAY_IDENTITY_SECRET:?set GATEWAY_IDENTITY_SECRET}
    depends_on:
      - mongo
    networks:
      - app-network
    restart: always

  # 学习资源服务
  resource-service:
    build: ./backend/services/resource-service
    environment:
      - NODE_ENV=production
      - PORT=3005
      - MONGO_URI=mongodb://mongo:27017/learning-tracker?replicaSet=rs0
      - GATEWAY_IDENTITY_SECRET=${GATEWAY_IDENTITY_SECRET:?set GATEWAY_IDENTITY_SECRET}
    volumes:
      - resource-data:/app/uploads
    depends_on:
      - mongo
    networks:
      - app-network
    restart: always

  # 数据分析服务
  analytics-service:
    build: ./backend/services/analytics-service
    environment:
      - NODE_ENV=production
      - PORT=3006
      - MONGO_URI=mongodb://mongo:27017/learning-tracker?replicaSet=rs0
    depends_on:
      - mongo
    networks:
      - app-network
    restart: always

  # 通知服务
  notification-service:
    build: ./backend/services/notification-service
    environment:
      - NODE_ENV=production
      - PORT=3007
      - MONGO_URI=mongodb://mongo:27017/learning-tracker?replicaSet=rs0
      - RABBITMQ_URL=amqp://rabbitmq
    depends_on:
      - mongo
      - rabbitmq
    networks:
      - app-network
    restart: always

  # Web前端
  web-frontend:
    build: ./frontend/web
    ports:
      - "80:80"
    networks:
      - app-network
    restart: always

  # MongoDB数据库 - 使用国内镜像
  mongo:
    image: registry.cn-hangzhou.aliyuncs.com/library/mongo:4.4
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongo", "--quiet", "--eval", "quit(db.adminCommand({hello:1}).isWritablePrimary ? 0 : 2)"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - app-network
    restart: always

  mongo-init:
    image: registry.cn-hangzhou.aliyuncs.com/library/mongo:4.4
    depends_on:
      - mongo
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        until mongo --host mongo:27017 --quiet --eval "db.adminCommand('ping').ok"; do sleep 2; done;
        mongo --host mongo:27017 --quiet --eval "try { rs.status() } catch (error) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo:27017'}]}) }";
        until mongo --host mongo:27017 --quiet --eval "quit(db.adminCommand({hello:1}).isWritablePrimary ? 0 : 2)"; do sleep 2; done
    networks:
      - app-network
    restart: "no"

  # RabbitMQ消息队列 - 使用国内镜像
  rabbitmq:
    image: registry.cn-hangzhou.aliyuncs.com/library/rabbitmq:3-management
    ports:
      - "5672:5672"  # AMQP协议端口
      - "15672:15672"  # 管理界面端口
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - app-network
    restart: always

  # MinIO对象存储 - 使用国内镜像
  minio:
    image: registry.cn-hangzhou.aliyuncs.com/minio/minio:latest
    ports:
      - "9000:9000"  # API端口
      - "9001:9001"  # 控制台端口
    volumes:
      - minio-data:/data
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server --console-address ":9001" /data
    networks:
      - app-network
    restart: always

  # Redis缓存服务 - 使用国内镜像
  redis:
    image: registry.cn-hangzhou.aliyuncs.com/library/redis:6
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network
    restart: always

  # 数据服务
  data-service:
    build: ./backend/services/data-service
    environment:
      - NODE_ENV=production
      - PORT=3008
      - MONGO_URI=mongodb://mongo:27017/learning-tracker?replicaSet=rs0
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    depends_on:
      - mongo
      - minio
    networks:
      - app-network
    restart: always

networks:
  app-network:
    driver: bridge

volumes:
  mongo-data:
  rabbitmq-data:
  minio-data:
  resource-data:
  redis-data:
