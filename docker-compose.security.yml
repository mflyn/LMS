# Optional secure-production overlay. Requires a host with at least 4 GiB free
# memory for ClamAV in addition to the family stack.
# Usage: docker compose -f docker-compose.family.yml -f docker-compose.security.yml up -d --wait

services:
  resource-service:
    environment:
      - MEDIA_SECURITY_PROFILE=secure-production
      - CLAMAV_HOST=clamav
      - CLAMAV_PORT=3310
      - CLAMAV_CONNECT_TIMEOUT_MS=2000
      - CLAMAV_SCAN_TIMEOUT_MS=30000
    depends_on:
      clamav:
        condition: service_healthy
    networks:
      - app-network
      - scanner-network

  clamav:
    image: clamav/clamav:1.4.5-debian13-slim@sha256:0542880c8abebb7430be5366657aec561f03693ed7be4e64a45fd2ee60b08d02
    healthcheck:
      test: ["CMD-SHELL", "clamdcheck.sh || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 36
      start_period: 180s
    mem_limit: 4g
    cpus: 1.0
    networks:
      - scanner-network
    restart: unless-stopped

networks:
  scanner-network:
    internal: true
