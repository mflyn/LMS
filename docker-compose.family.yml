# Family growth tracker minimal local development stack.
# Usage: docker compose -f docker-compose.family.yml up -d

services:
  gateway:
    build:
      context: .
      dockerfile: backend/gateway/Dockerfile
    ports:
      - "${FAMILY_GATEWAY_HOST_PORT:-3000}:3000"
    environment:
      - NODE_ENV=development
      - GATEWAY_PORT=3000
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-32-characters-minimum}
      - MONGO_URI=mongodb://mongo:27017/learning-tracker?replicaSet=rs0
      - GATEWAY_IDENTITY_SECRET=${GATEWAY_IDENTITY_SECRET:-dev-gateway-identity-secret-32chars}
      - USER_SERVICE_URL=http://user-service:3001
      - PROGRESS_SERVICE_URL=http://progress-service:3002
      - HOMEWORK_SERVICE_URL=http://homework-service:3003
      - RESOURCE_SERVICE_URL=http://resource-service:3005
      - ANALYTICS_SERVICE_URL=http://analytics-service:3006
      - NOTIFICATION_SERVICE_URL=http://notification-service:3007
    depends_on:
      mongo-init:
        condition: service_completed_successfully
      user-service:
        condition: service_healthy
      progress-service:
        condition: service_healthy
      homework-service:
        condition: service_healthy
      resource-service:
        condition: service_healthy
      analytics-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - app-network

  user-service:
    build:
      context: .
      dockerfile: backend/services/user-service/Dockerfile
    environment:
      - NODE_ENV=development
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-32-characters-minimum}
      - MONGO_URI=mongodb://mongo:27017/learning-tracker?replicaSet=rs0
      - GATEWAY_IDENTITY_SECRET=${GATEWAY_IDENTITY_SECRET:-dev-gateway-identity-secret-32chars}
      - RESOURCE_SERVICE_URL=http://resource-service:3005
      - MEDIA_REFERENCE_SERVICE_TOKEN=${MEDIA_REFERENCE_SERVICE_TOKEN:-dev-media-reference-token-32chars}
      - SENSITIVE_RATE_LIMIT_MAX_REQUESTS=${SENSITIVE_RATE_LIMIT_MAX_REQUESTS:-20}
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - app-network

  progress-service:
    build:
      context: .
      dockerfile: backend/services/progress-service/Dockerfile
    environment:
      - NODE_ENV=development
      - PORT=3002
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-32-characters-minimum}
      - MONGO_URI=mongodb://mongo:27017/learning-tracker?replicaSet=rs0
      - GATEWAY_IDENTITY_SECRET=${GATEWAY_IDENTITY_SECRET:-dev-gateway-identity-secret-32chars}
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-dev-internal-service-token-32chars}
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3002/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - app-network

  homework-service:
    build:
      context: .
      dockerfile: backend/services/homework-service/Dockerfile
    environment:
      - NODE_ENV=development
      - PORT=3003
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-32-characters-minimum}
      - MONGO_URI=mongodb://mongo:27017/learning-tracker?replicaSet=rs0
      - GATEWAY_IDENTITY_SECRET=${GATEWAY_IDENTITY_SECRET:-dev-gateway-identity-secret-32chars}
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-dev-internal-service-token-32chars}
      - PROGRESS_SERVICE_URL=http://progress-service:3002
      - STAR_AWARD_TIMEOUT_MS=${STAR_AWARD_TIMEOUT_MS:-3000}
      - RESOURCE_SERVICE_URL=http://resource-service:3005
      - MEDIA_REFERENCE_SERVICE_TOKEN=${MEDIA_REFERENCE_SERVICE_TOKEN:-dev-media-reference-token-32chars}
      - ENABLE_RABBITMQ=false
    depends_on:
      mongo-init:
        condition: service_completed_successfully
      progress-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3003/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - app-network

  resource-service:
    build:
      context: .
      dockerfile: backend/services/resource-service/Dockerfile
    environment:
      - NODE_ENV=development
      - PORT=3005
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-32-characters-minimum}
      - MONGO_URI=mongodb://mongo:27017/learning-tracker?replicaSet=rs0
      - GATEWAY_IDENTITY_SECRET=${GATEWAY_IDENTITY_SECRET:-dev-gateway-identity-secret-32chars}
      - PRIVATE_MEDIA_ROOT=/var/lib/family-growth/private-media
      - MEDIA_REFERENCE_SERVICE_TOKEN=${MEDIA_REFERENCE_SERVICE_TOKEN:-dev-media-reference-token-32chars}
      - MEDIA_SIGNING_SECRET=${MEDIA_SIGNING_SECRET:-dev-media-signing-secret-32-characters}
    volumes:
      - resource-data:/var/lib/family-growth/private-media
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3005/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - app-network

  analytics-service:
    build:
      context: .
      dockerfile: backend/services/analytics-service/Dockerfile
    environment:
      - NODE_ENV=development
      - PORT=3006
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-32-characters-minimum}
      - MONGO_URI=mongodb://mongo:27017/learning-tracker?replicaSet=rs0
      - GATEWAY_IDENTITY_SECRET=${GATEWAY_IDENTITY_SECRET:-dev-gateway-identity-secret-32chars}
      - RESOURCE_SERVICE_URL=http://resource-service:3005
      - MEDIA_REFERENCE_SERVICE_TOKEN=${MEDIA_REFERENCE_SERVICE_TOKEN:-dev-media-reference-token-32chars}
      - REPORT_HISTORY_AVAILABLE_FROM=2026-06-01
    depends_on:
      mongo-init:
        condition: service_completed_successfully
      resource-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3006/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - app-network

  notification-service:
    build:
      context: .
      dockerfile: backend/services/notification-service/Dockerfile
    environment:
      - NODE_ENV=development
      - PORT=3007
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-32-characters-minimum}
      - MONGO_URI=mongodb://mongo:27017/learning-tracker?replicaSet=rs0
      - GATEWAY_IDENTITY_SECRET=${GATEWAY_IDENTITY_SECRET:-dev-gateway-identity-secret-32chars}
      - ENABLE_RABBITMQ=false
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3007/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - app-network

  mongo:
    image: mongo:4.4
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "${FAMILY_MONGO_HOST_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongo", "--quiet", "--eval", "quit(db.adminCommand('ping').ok ? 0 : 2)"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - app-network

  mongo-init:
    image: mongo:4.4
    depends_on:
      mongo:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        until mongo --host mongo:27017 --quiet --eval "db.adminCommand('ping').ok"; do sleep 2; done;
        mongo --host mongo:27017 --quiet --eval "try { if (!rs.status().ok) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo:27017'}]}) } } catch (error) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo:27017'}]}) }";
        until mongo --host mongo:27017 --quiet --eval "quit(db.adminCommand({hello:1}).isWritablePrimary ? 0 : 2)"; do sleep 2; done;
        mongo --host mongo:27017 learning-tracker --quiet --eval 'db.roles.updateOne({name:"parent"},{$$setOnInsert:{description:"Family parent",permissions:[]}},{upsert:true});db.roles.updateOne({name:"student"},{$$setOnInsert:{description:"Family child",permissions:[]}},{upsert:true})'
    networks:
      - app-network
    restart: "no"

networks:
  app-network:
    driver: bridge

volumes:
  mongo-data:
  resource-data:
