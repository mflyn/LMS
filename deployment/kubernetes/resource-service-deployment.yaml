apiVersion: apps/v1
kind: Deployment
metadata:
  name: resource-service
  labels:
    app: resource-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: resource-service
  template:
    metadata:
      labels:
        app: resource-service
    spec:
      containers:
      - name: resource-service
        image: learning-tracker/resource-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3005
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3005"
        - name: MONGO_URI
          value: "mongodb://mongo:27017/learning-tracker?replicaSet=rs0"
        - name: GATEWAY_IDENTITY_SECRET
          valueFrom:
            secretKeyRef:
              name: family-growth-secrets
              key: gateway-identity-secret
        - name: PRIVATE_MEDIA_ROOT
          value: "/var/lib/family-growth/private-media"
        - name: MEDIA_SECURITY_PROFILE
          value: "secure-production"
        - name: CLAMAV_HOST
          value: "clamav"
        - name: CLAMAV_PORT
          value: "3310"
        - name: CLAMAV_CONNECT_TIMEOUT_MS
          value: "2000"
        - name: CLAMAV_SCAN_TIMEOUT_MS
          value: "30000"
        - name: MEDIA_REFERENCE_SERVICE_TOKEN
          valueFrom:
            secretKeyRef:
              name: family-growth-secrets
              key: media-reference-service-token
        - name: MEDIA_SIGNING_SECRET
          valueFrom:
            secretKeyRef:
              name: family-growth-secrets
              key: media-signing-secret
        volumeMounts:
        - name: private-media
          mountPath: /var/lib/family-growth/private-media
        resources:
          limits:
            cpu: "300m"
            memory: "384Mi"
          requests:
            cpu: "150m"
            memory: "192Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 3005
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3005
          initialDelaySeconds: 5
          periodSeconds: 5
        startupProbe:
          httpGet:
            path: /health
            port: 3005
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 36
      volumes:
      - name: private-media
        persistentVolumeClaim:
          claimName: resource-private-media
---
apiVersion: v1
kind: Service
metadata:
  name: resource-service
spec:
  selector:
    app: resource-service
  ports:
  - port: 3005
    targetPort: 3005
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: resource-private-media
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
