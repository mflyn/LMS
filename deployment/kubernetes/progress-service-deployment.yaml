apiVersion: apps/v1
kind: Deployment
metadata:
  name: progress-service
  labels:
    app: progress-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: progress-service
  template:
    metadata:
      labels:
        app: progress-service
    spec:
      containers:
      - name: progress-service
        image: learning-tracker/progress-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3002
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3002"
        - name: MONGO_URI
          value: "mongodb://mongo:27017/learning-tracker?replicaSet=rs0"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: family-growth-secrets
              key: jwt-secret
        - name: GATEWAY_IDENTITY_SECRET
          valueFrom:
            secretKeyRef:
              name: family-growth-secrets
              key: gateway-identity-secret
        - name: INTERNAL_SERVICE_TOKEN
          valueFrom:
            secretKeyRef:
              name: family-growth-secrets
              key: internal-service-token
        resources:
          limits:
            cpu: "300m"
            memory: "384Mi"
          requests:
            cpu: "150m"
            memory: "192Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: progress-service
spec:
  selector:
    app: progress-service
  ports:
  - port: 3002
    targetPort: 3002
  type: ClusterIP
