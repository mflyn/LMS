apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: family-growth-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: family-growth-secret-store
    kind: ClusterSecretStore
  target:
    name: family-growth-secrets
    creationPolicy: Owner
  data:
    - secretKey: jwt-secret
      remoteRef:
        key: family-growth/jwt-secret
    - secretKey: gateway-identity-secret
      remoteRef:
        key: family-growth/gateway-identity-secret
    - secretKey: internal-service-token
      remoteRef:
        key: family-growth/internal-service-token
    - secretKey: media-reference-service-token
      remoteRef:
        key: family-growth/media-reference-service-token
