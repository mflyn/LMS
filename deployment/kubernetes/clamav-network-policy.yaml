apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: clamav-resource-service-only
spec:
  podSelector:
    matchLabels:
      app: clamav
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: resource-service
    ports:
    - protocol: TCP
      port: 3310
