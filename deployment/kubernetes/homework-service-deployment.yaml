apiVersion: apps/v1
kind: Deployment
metadata:
  name: homework-service
  labels:
    app: homework-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: homework-service
  template:
    metadata:
      labels:
        app: homework-service
    spec:
      containers:
      - name: homework-service
        image: learning-tracker/homework-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3003
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3003"
        - name: MONGO_URI
          value: "mongodb://mongo:27017/learning-tracker?replicaSet=rs0"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: family-growth-secrets
              key: jwt-secret
        - name: GATEWAY_IDENTITY_SECRET
          valueFrom:
            secretKeyRef:
              name: family-growth-secrets
              key: gateway-identity-secret
        - name: PROGRESS_SERVICE_URL
          value: "http://progress-service:3002"
        - name: RESOURCE_SERVICE_URL
          value: "http://resource-service:3005"
        - name: STAR_AWARD_TIMEOUT_MS
          value: "3000"
        - name: INTERNAL_SERVICE_TOKEN
          valueFrom:
            secretKeyRef:
              name: family-growth-secrets
              key: internal-service-token
        - name: MEDIA_REFERENCE_SERVICE_TOKEN
          valueFrom:
            secretKeyRef:
              name: family-growth-secrets
              key: media-reference-service-token
        resources:
          limits:
            cpu: "300m"
            memory: "384Mi"
          requests:
            cpu: "150m"
            memory: "192Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 3003
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3003
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: homework-service
spec:
  selector:
    app: homework-service
  ports:
  - port: 3003
    targetPort: 3003
  type: ClusterIP
